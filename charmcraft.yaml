type: charm
name: ddeb-retriever
title: ddeb-retriever
summary: Maintain a mirror of ddeb
description: |
  ddeb-retriever fetches ddeb to serve a debug symbol archive.

base: ubuntu@24.04
platforms:
  amd64: null
  arm64: null

parts:
  charm:
    plugin: uv
    source: .
    build-snaps:
      - astral-uv

charm-libs:
  - lib: traefik_k8s.ingress
    version: "2"

config:
  options:
    git-repository:
      description: |
        Source git repository of ddeb-retriever
      default: "https://git.launchpad.net/ddeb-retriever"
      type: string
    git-ref:
      description: |
        Source git ref of ddeb-retriever.
        Can be a branch name, tag, or full commit hash.
      default: "main"
      type: string
    schedule:
      description: |
        Running schedule in systemd calendar format.
        Can be tested using: systemd-analyze calendar <schedule>
      default: "daily"
      type: string
    lp-sign-config:
      description: |
        Configuration for the Launchpad Signing Service.
        This configuration is used to sign the indexes generated for the ddeb
        archive. This should be set to a user secret URI.

        e.g. uri=$(juju add-secret lpsign 'config#file=/path/to/file')
             juju grant-secret lpsign ddeb-retriever
             juju config ddeb-retriever "lp-sign-config=${uri}"
      type: secret

actions:
  update:
    description: Update the git checkout.
  pause:
    description: Pause the service.
  resume:
    description: Resume the service.
  run:
    description: |
      Run the importer now.
      Args can be passed to the underlying command. e.g.
        juju run ddeb-retriever/leader run args="-h" 
    properties:
      args:
        description: Arguments to pass to ddeb-retriever
        type: string

requires:
  ingress:
    interface: ingress
    limit: 1
