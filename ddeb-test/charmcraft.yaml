type: charm
name: ddeb-test
title: ddeb-retriever test functionality
summary: ddeb-retriever test functionality
description: |
  Adds test actions and overrides for running ddeb-retriever in development.
subordinate: true
base: ubuntu@24.04
platforms:
  amd64:
  arm64:

assumes:
  - juju >= 3.6

parts:
  charm:
    plugin: uv
    source: .
    build-snaps:
      - astral-uv

requires:
  juju-info:
    interface: juju-info
    scope: container

actions:
  reset-timestamp:
    description: For testing. Resets the timestamp to limit to new packages.
    params:
      timestamp:
        description: |-
          The timestamp to reset to, in seconds since the Epoch.
          defaults to "now"
        type: integer
